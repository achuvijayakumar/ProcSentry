scan_interval: 5
history_retention_days: 7
data_dir: ./data
database_url: sqlite:///./data/procsentry.db

duplicate_detection:
  enabled: true
  confidence_threshold: 75
  suppression_window_seconds: 300
  restart_loop_window_seconds: 120
  restart_loop_threshold: 3
  allowlist_fingerprints: []
  allowlist_commands: []

storage:
  history_sample_interval_seconds: 15
  maintenance_interval_seconds: 3600
  wal_checkpoint_interval_seconds: 3600
  vacuum_interval_seconds: 86400

alerts:
  ram_threshold_mb: 2000
  cpu_threshold_percent: 90

security:
  enabled: true

web:
  host: 127.0.0.1
  port: 8080
  auth_enabled: false
  auth_username: admin
  auth_password:
  session_secret:
  csrf_enabled: true
  secure_cookies: false

healing:
  enabled: false
  dry_run: true
