{% extends "base.html" %}
{% block content %}
<h1 class="mb-3 font-mono text-xs text-zinc-500 uppercase tracking-widest">// remote</h1>

{% if not hosts %}
<div class="rounded border border-zinc-800 bg-zinc-900 p-4">
  <p class="font-mono text-xs text-zinc-400">No remote hosts configured. Add one in <a class="text-green-400 hover:underline" href="{{ url(request, '/settings') }}">settings</a>.</p>
</div>
{% else %}
<div class="mb-3 flex items-center gap-2 font-mono text-xs">
  {% for h in hosts %}
  <a href="{{ url(request, '/remote') }}?host={{ h.name }}"
     class="px-2 py-1 rounded border transition-colors {% if h.name == selected %}border-green-700 text-green-400 bg-green-950/40{% else %}border-zinc-800 text-zinc-400 hover:text-zinc-100 hover:border-zinc-600{% endif %}">{{ h.name }}</a>
  {% endfor %}
  <button class="ml-auto px-2 py-1 rounded border border-zinc-700 text-zinc-400 hover:text-zinc-100 hover:border-zinc-500 transition-colors"
          hx-get="{{ url(request, '/remote/' ~ selected ~ '/partials/processes') }}"
          hx-target="#remote-table" hx-swap="innerHTML"
          hx-indicator="#remote-busy">[ refresh ]</button>
  <span id="remote-busy" class="htmx-indicator text-zinc-500">connecting…</span>
</div>

<input data-ps-filter="remote-table"
       placeholder="/ filter"
       class="mb-2 w-full max-w-xs rounded border border-zinc-700 bg-zinc-950 px-2 py-1.5 font-mono text-xs text-zinc-100 focus:border-green-500 focus:outline-none"
       oninput="psFilterRows(this)">

<div id="remote-table"
     hx-get="{{ url(request, '/remote/' ~ selected ~ '/partials/processes') }}"
     hx-trigger="load" hx-swap="innerHTML">
  <p class="font-mono text-xs text-zinc-500">connecting to {{ selected }}…</p>
</div>
{% endif %}
{% endblock %}
