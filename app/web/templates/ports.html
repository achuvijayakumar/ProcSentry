{% extends "base.html" %}
{% block content %}
<h1 class="mb-3 font-mono text-xs text-zinc-500 uppercase tracking-widest">// port explorer</h1>

<div class="mb-3 flex flex-wrap gap-2 items-center">
  <input
    id="port-filter"
    type="text"
    placeholder="filter by port or process..."
    class="rounded border border-zinc-700 bg-zinc-900 px-3 py-1.5 font-mono text-xs text-zinc-200 placeholder-zinc-600 w-full sm:w-64"
    oninput="filterPorts()"
  >
  <div class="flex gap-1 font-mono text-xs">
    <button onclick="setExposure('all')" id="btn-all" class="px-2 py-1.5 rounded border border-cyan-700 text-cyan-400 transition-colors">all</button>
    <button onclick="setExposure('public')" id="btn-public" class="px-2 py-1.5 rounded border border-zinc-700 text-zinc-400 hover:border-amber-700 hover:text-amber-400 transition-colors">public</button>
    <button onclick="setExposure('local')" id="btn-local" class="px-2 py-1.5 rounded border border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200 transition-colors">local</button>
  </div>
  <span id="port-count" class="font-mono text-xs text-zinc-600"></span>
</div>

<div class="overflow-x-auto rounded border border-zinc-800">
  <table class="min-w-full text-left" id="ports-table">
    <thead class="bg-zinc-900 font-mono text-xs uppercase text-zinc-500 tracking-wider">
      <tr>
        <th class="px-2 py-1.5">Port</th>
        <th class="px-2 py-1.5">Proto</th>
        <th class="px-2 py-1.5">Address</th>
        <th class="px-2 py-1.5">Process</th>
        <th class="px-2 py-1.5">Exposure</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-zinc-800/60 bg-zinc-950 font-mono text-xs">
      {% for row in rows %}
      <tr data-port="{{ row.port }}" data-process="{{ row.process|lower }}" data-public="{{ 'true' if row.public else 'false' }}" class="hover:bg-zinc-900">
        <td class="px-2 py-1 text-cyan-400 font-bold">{{ row.port }}</td>
        <td class="px-2 py-1 text-zinc-500">{{ row.protocol }}</td>
        <td class="px-2 py-1 text-zinc-400">{{ row.address }}</td>
        <td class="px-2 py-1"><a class="text-cyan-400 hover:underline" href="/processes/{{ row.pid }}">{{ row.process }}</a> <span class="text-zinc-600">({{ row.pid }})</span></td>
        <td class="px-2 py-1">{% if row.public %}<span class="text-amber-400">PUBLIC</span>{% else %}<span class="text-zinc-600">local</span>{% endif %}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
  let exposureFilter = 'all';

  function setExposure(mode) {
    exposureFilter = mode;
    document.getElementById('btn-all').className = 'px-2 py-1.5 rounded border transition-colors font-mono text-xs ' + (mode === 'all' ? 'border-cyan-700 text-cyan-400' : 'border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200');
    document.getElementById('btn-public').className = 'px-2 py-1.5 rounded border transition-colors font-mono text-xs ' + (mode === 'public' ? 'border-amber-700 text-amber-400' : 'border-zinc-700 text-zinc-400 hover:border-amber-700 hover:text-amber-400');
    document.getElementById('btn-local').className = 'px-2 py-1.5 rounded border transition-colors font-mono text-xs ' + (mode === 'local' ? 'border-zinc-500 text-zinc-200' : 'border-zinc-700 text-zinc-400 hover:border-zinc-500 hover:text-zinc-200');
    filterPorts();
  }

  function filterPorts() {
    const q = document.getElementById('port-filter').value.toLowerCase();
    const rows = document.querySelectorAll('#ports-table tbody tr');
    let visible = 0;
    rows.forEach(row => {
      const port = row.dataset.port || '';
      const process = row.dataset.process || '';
      const isPublic = row.dataset.public === 'true';
      const matchText = !q || port.includes(q) || process.includes(q);
      const matchExposure = exposureFilter === 'all' || (exposureFilter === 'public' && isPublic) || (exposureFilter === 'local' && !isPublic);
      const show = matchText && matchExposure;
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    document.getElementById('port-count').textContent = visible + ' / ' + rows.length + ' ports';
  }

  filterPorts();
</script>
{% endblock %}
