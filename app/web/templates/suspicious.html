{% extends "base.html" %}
{% block content %}
<h1 class="mb-3 font-mono text-xs text-zinc-500 uppercase tracking-widest">// suspicious processes</h1>
{% if processes %}
<input type="search" data-ps-filter="ps-suspicious" oninput="psFilterRows(this)" placeholder="filter processes... ( / )"
       class="mb-3 w-full sm:w-64 rounded border border-zinc-700 bg-zinc-900 px-3 py-1.5 font-mono text-xs text-zinc-200 placeholder-zinc-600 focus:border-cyan-700 focus:outline-none">
<div id="ps-suspicious">
{% include "partials/process_table.html" %}
</div>
{% else %}
<div class="rounded border border-zinc-800 bg-zinc-900 p-6 text-sm text-zinc-400">No suspicious processes detected.</div>
{% endif %}
{% endblock %}
