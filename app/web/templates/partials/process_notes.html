<div class="rounded border border-zinc-800 bg-zinc-900 p-3 text-sm">
  {% for item in notes %}
  <div class="border-b border-zinc-800 py-2 last:border-b-0">
    {% if item.tag %}<span class="mr-2 rounded bg-zinc-700 px-2 py-1 text-xs">{{ item.tag }}</span>{% endif %}
    <span>{{ item.note }}</span>
    <div class="mt-1 text-xs text-zinc-500">{{ item.created_at }}</div>
  </div>
  {% else %}
  <div class="text-zinc-400">No notes yet.</div>
  {% endfor %}
</div>
