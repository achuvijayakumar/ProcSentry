{% extends "base.html" %}
{% block content %}
<div class="mb-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
  <h1 class="font-mono text-xs text-zinc-500 uppercase tracking-widest">// processes</h1>
  <form class="flex flex-wrap gap-2 items-center font-mono text-xs" method="get">
    <input class="w-full sm:w-auto rounded border border-zinc-700 bg-zinc-900 px-3 py-1.5 text-zinc-200 placeholder-zinc-600 focus:border-cyan-700 focus:outline-none" name="q" value="{{ q }}" placeholder="search command...">
    <label class="flex items-center gap-1 text-zinc-400 cursor-pointer"><input type="checkbox" name="suspicious" value="true" {% if suspicious %}checked{% endif %}> suspicious</label>
    <label class="flex items-center gap-1 text-zinc-400 cursor-pointer"><input type="checkbox" name="duplicates" value="true" {% if duplicates %}checked{% endif %}> duplicates</label>
    <label class="flex items-center gap-1 text-zinc-400 cursor-pointer"><input type="checkbox" name="group_by_app" value="true" {% if group_by_app %}checked{% endif %}> group by app</label>
    <button class="rounded border border-cyan-700 bg-cyan-950 px-2 py-1 text-cyan-400 hover:bg-cyan-900 transition-colors">[filter]</button>
  </form>
</div>

{% if app_summary %}
<div class="mb-3 flex flex-wrap gap-2 font-mono text-xs">
  {% for app, count in app_summary %}
  <span class="rounded border border-zinc-800 bg-zinc-900 px-2 py-1">
    <span class="text-amber-300">{{ app }}</span>
    <span class="text-zinc-500 ml-1">{{ count }}</span>
  </span>
  {% endfor %}
</div>
{% endif %}

{% include "partials/process_table.html" %}
{% endblock %}
