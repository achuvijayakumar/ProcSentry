{% extends "base.html" %}
{% block content %}
<h1 class="mb-3 font-mono text-xs text-zinc-500 uppercase tracking-widest">// runtime capabilities</h1>
<div class="grid gap-3 sm:grid-cols-2">
  {% for key, value in capabilities.items() %}
  <div class="flex items-center justify-between rounded border border-zinc-800 bg-zinc-900 p-3">
    <span class="text-sm text-zinc-300">{{ key }}</span>
    {% if value is sameas true %}
    <span class="rounded bg-emerald-500 px-2 py-1 text-xs font-semibold text-zinc-950">enabled</span>
    {% elif value is sameas false %}
    <span class="rounded bg-amber-500 px-2 py-1 text-xs font-semibold text-zinc-950">disabled</span>
    {% else %}
    <span class="text-sm text-zinc-100">{{ value }}</span>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endblock %}
